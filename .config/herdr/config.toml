onboarding = false

[theme]
name = "tokyo-night"

[update]
# 本体更新は Brewfile 管理
version_check = false

[ui]
show_agent_labels_on_pane_borders = false
agent_panel_sort = "priority"
prompt_new_tab_name = false

[ui.toast]
# Ghostty の desktop-notifications を経由させる
# SSH アタッチ時も手元の端末に届く
delivery = "terminal"

[experimental]
# Claude Code 等の TUI は自前でカーソルを描くため、macOS IME が変換候補ウィンドウの位置を見失う
reveal_hidden_cursor_for_cjk_ime = true
cjk_ime_agents = ["claude", "cursor"]
switch_ascii_input_source_in_prefix = true
