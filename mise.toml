#:tombi schema.strict = false

[settings]
experimental = true

[dotfiles]
"~/.config"   = ".config"
"~/.zshrc"    = ".zshrc"
"~/.zprofile" = ".zprofile"
# Machine-level agent settings live in this repo; portable rules and skills
# come from the rules-for-ai plugin, pinned declaratively in
# .config/claude/settings.json (extraKnownMarketplaces + enabledPlugins).
"~/.claude/hooks"                 = ".config/claude/hooks"
"~/.claude/settings.json"         = ".config/claude/settings.json"
"~/.claude/statusline-command.sh" = ".config/claude/statusline-command.sh"
"~/.cursor/mcp.json"              = ".config/cursor/mcp.json"
"~/Library/Developer/Xcode/UserData/FontAndColorThemes/tokyo-night.xccolortheme" = ".config/xcode/tokyo-night.xccolortheme"

# Curated sections: semantic keys mise maps to canonical defaults writes.
[bootstrap.macos.keyboard]
key_repeat         = 2
initial_key_repeat = 15

[bootstrap.macos.finder]
show_pathbar = true

[bootstrap.macos.trackpad]
tap_to_click = true

# Raw writes for keys with no curated section. Captured from this machine's current
# state — only settings that differ from macOS factory defaults.
[bootstrap.macos.defaults]
"NSGlobalDomain"          = { ApplePressAndHoldEnabled = false, AppleShowAllExtensions = true, "com.apple.mouse.scaling" = 2.5, "com.apple.trackpad.scaling" = 0.875, "com.apple.swipescrolldirection" = false, AppleInterfaceStyle = "Dark" }
"com.apple.finder"        = { AppleShowAllFiles = true, ShowStatusBar = true, FXPreferredViewStyle = "Nlsv" }
"com.apple.dock"          = { tilesize = 52.0 }
"com.apple.WindowManager" = { EnableStandardClickToShowDesktop = false }

[bootstrap.hooks.post-defaults]
run = "killall Finder SystemUIServer Dock || true"

[bootstrap.user]
login_shell = "/bin/zsh"

[tasks.bootstrap]
run = [
  "brew bundle --file={{config_root}}/Brewfile",
  "pre-commit install --install-hooks",
]
